<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07130f">
  <title>小蝴蝶歌曲 PK</title>
  <meta name="description" content="连续二选一，选出你心里的歌曲冠军。">
  <style>
    :root{--bg:#07130f;--green:#4be8a6;--green-soft:#a8f5d0;--purple:#a97bff;--purple-soft:#d9c4ff;--ink:#f2fff9;--muted:#86a69a;--card:#10251e;--line:rgba(168,245,208,.18)}
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0;background:#050d0a;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
    button{font:inherit}
    button:focus-visible{outline:2px solid var(--green);outline-offset:4px}
    .app{position:relative;isolation:isolate;width:min(100%,480px);min-height:100svh;margin:auto;padding:max(22px,env(safe-area-inset-top)) clamp(18px,5vw,26px) max(24px,env(safe-area-inset-bottom));overflow:hidden;background:radial-gradient(circle at 14% 30%,rgba(28,92,70,.24),transparent 31%),radial-gradient(circle at 94% 88%,rgba(61,42,99,.24),transparent 28%),linear-gradient(155deg,#091813,#07130f 57%,#080d0b)}
    .topbar{display:flex;align-items:center;justify-content:space-between;min-height:50px}
    .brand{display:flex;align-items:center;gap:12px}.brand div{display:grid;gap:3px}.brand strong{font-size:15px;letter-spacing:.02em}.brand span{color:var(--muted);font-size:12px;letter-spacing:.08em}
    .butterfly{display:grid;grid-template-columns:repeat(2,9px);grid-template-rows:repeat(2,7px);gap:2px;width:20px;height:16px}.butterfly i{display:block;background:var(--green)}.butterfly i:nth-child(1),.butterfly i:nth-child(4){border-radius:80% 20% 80% 20%}.butterfly i:nth-child(2),.butterfly i:nth-child(3){border-radius:20% 80% 20% 80%}
    .reset{width:42px;height:42px;padding:0;border:0;color:var(--muted);background:transparent;font-size:31px;cursor:pointer}.progress{height:2px;margin-top:13px;overflow:hidden;background:rgba(168,245,208,.13)}.progress i{display:block;height:100%;border-radius:99px;background:var(--green);transition:width .4s ease}
    .hero{display:grid;justify-items:center;padding:clamp(52px,9svh,82px) 0 clamp(34px,5.5svh,50px);text-align:center}.pill{display:inline-flex;align-items:center;min-height:34px;padding:0 18px;border:1px solid rgba(168,245,208,.28);border-radius:999px;color:var(--green-soft);background:rgba(16,37,30,.62);font-size:11px;font-weight:650;letter-spacing:.15em}.hero h1{margin:20px 0 7px;font-size:clamp(42px,12vw,58px);font-weight:800;letter-spacing:-.055em;line-height:1.1}.hero p{margin:0;color:var(--muted);font-size:14px;letter-spacing:.24em}
    .battle{position:relative;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}.card{position:relative;display:grid;grid-template-rows:auto 100px;min-width:0;padding:0;overflow:hidden;border:1px solid var(--line);border-radius:24px;color:inherit;background:var(--card);text-align:left;cursor:pointer;transition:transform .22s ease,opacity .32s ease,filter .32s ease,border-color .22s ease;-webkit-tap-highlight-color:transparent}.card:active{transform:scale(.985)}.card[disabled]{cursor:default}.card.selected{border-color:var(--green);transform:translateY(-4px)}.card.loser-left{opacity:0;filter:saturate(.25);transform:perspective(700px) rotateY(34deg) translateX(-20px) scale(.92);transform-origin:right center}.card.loser-right{opacity:0;filter:saturate(.25);transform:perspective(700px) rotateY(-34deg) translateX(20px) scale(.92);transform-origin:left center}
    .art{position:relative;aspect-ratio:1;overflow:hidden}.grain{position:absolute;inset:0;z-index:8;opacity:.13;background-image:radial-gradient(rgba(255,255,255,.38) .5px,transparent .5px);background-size:5px 5px;mix-blend-mode:soft-light}.firefly{background:linear-gradient(155deg,#4b816c,#1c5c46 42%,#0c261d)}.firefly:before,.firefly:after{position:absolute;right:-7%;bottom:0;left:-7%;height:50%;background:#123d2d;clip-path:polygon(0 100%,0 62%,9% 68%,16% 28%,23% 72%,31% 45%,39% 80%,47% 21%,55% 73%,64% 42%,72% 78%,80% 30%,88% 65%,96% 39%,100% 100%);content:""}.firefly:after{height:34%;background:#09241a}.dots{position:absolute;inset:0;z-index:4;background:radial-gradient(circle at 18% 22%,#e1ffa3 0 2px,transparent 3px),radial-gradient(circle at 35% 64%,#e1ffa3 0 2px,transparent 3px),radial-gradient(circle at 67% 29%,#e1ffa3 0 2px,transparent 3px),radial-gradient(circle at 81% 72%,#e1ffa3 0 2px,transparent 3px),radial-gradient(circle at 56% 84%,#e1ffa3 0 2px,transparent 3px);filter:drop-shadow(0 0 5px #cbff8a)}
    .klein{background:linear-gradient(145deg,#151560,#171444 55%,#070a26)}.klein:before{position:absolute;top:-8%;left:55%;width:52%;height:104%;background:linear-gradient(168deg,rgba(244,239,255,.9),rgba(169,123,255,.05) 76%);clip-path:polygon(43% 0,57% 0,100% 100%,0 100%);content:""}.klein:after{position:absolute;right:10%;bottom:11%;left:10%;height:13%;border-radius:50%;background:rgba(217,196,255,.54);content:""}
    .summer{background:linear-gradient(180deg,#e0c8a4,#d47c62 62%,#793f49)}.summer:before{position:absolute;top:18%;left:17%;width:30%;aspect-ratio:1;border-radius:50%;background:rgba(255,245,194,.85);content:""}.summer:after{position:absolute;right:-8%;bottom:0;left:-8%;height:42%;border-radius:50% 50% 0 0;background:#344a43;content:""}
    .moon{background:linear-gradient(155deg,#29495a,#1c2944 50%,#17142d)}.moon:before{position:absolute;top:18%;right:17%;width:31%;aspect-ratio:1;border-radius:50%;background:#d9e9de;box-shadow:0 0 27px rgba(217,233,222,.28);content:""}.moon:after{position:absolute;right:-10%;bottom:5%;left:-10%;height:28%;border-radius:50%;border-top:18px solid rgba(117,167,167,.36);transform:rotate(-8deg);content:""}
    .info{display:flex;flex-direction:column;justify-content:center;min-width:0;padding:16px 15px 17px;background:linear-gradient(150deg,rgba(18,43,34,.98),rgba(11,25,20,.98))}.info strong{display:-webkit-box;overflow:hidden;font-size:clamp(17px,5vw,21px);font-weight:780;letter-spacing:-.04em;line-height:1.18;-webkit-box-orient:vertical;-webkit-line-clamp:2}.info small{display:block;margin-top:9px;overflow:hidden;color:var(--muted);font-size:11px;line-height:1.35;text-overflow:ellipsis;white-space:nowrap}.check{position:absolute;top:12px;right:12px;z-index:15;display:grid;place-items:center;width:28px;height:28px;border-radius:50%;color:#092018;background:var(--green);opacity:0;transform:scale(.5);transition:.22s ease}.selected .check{opacity:1;transform:scale(1)}
    .vs{position:absolute;top:calc(50% - 38px);left:50%;z-index:20;display:grid;place-items:center;width:76px;height:76px;border:1px solid rgba(217,196,255,.18);border-radius:50%;color:var(--purple);background:#10130f;box-shadow:0 14px 36px rgba(0,0,0,.34);font-size:22px;font-weight:850;font-style:italic;letter-spacing:-.08em;transform:translateX(-50%)}
    .actions{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:24px}.actions p{margin:0;color:var(--muted);font-size:12px}.undo,.restart{min-height:42px;border:1px solid rgba(169,123,255,.52);border-radius:999px;color:var(--purple-soft);background:rgba(28,19,39,.42);cursor:pointer}.undo{padding:0 16px;font-size:13px}.undo:disabled{border-color:rgba(134,166,154,.16);color:rgba(134,166,154,.45)}.transition{position:fixed;inset:0;z-index:50;display:grid;place-content:center;justify-items:center;gap:18px;background:rgba(5,16,12,.9);backdrop-filter:blur(18px);animation:flash .85s ease both}.transition strong{font-size:34px}.transition .butterfly{transform:scale(1.8)}
    .champion{display:grid;justify-items:center;text-align:center;padding-top:24px}.crown{margin-top:15px;color:var(--purple);font-size:48px}.champion h1{margin:0;font-size:clamp(38px,12vw,54px);letter-spacing:-.06em}.champion>p{margin:3px 0;color:var(--muted);font-size:13px}.champ-cover{width:min(66vw,270px);margin-top:22px;overflow:hidden;border:1px solid rgba(75,232,166,.42);border-radius:28px;box-shadow:0 24px 60px rgba(0,0,0,.38)}.summary{display:grid;grid-template-columns:.8fr 1.8fr;gap:10px;width:100%;margin-top:16px}.summary div{padding:14px;border:1px solid var(--line);border-radius:16px;background:rgba(16,37,30,.66);text-align:left}.summary span{display:block;margin-bottom:7px;color:var(--muted);font-size:10px}.summary strong{font-size:12px;line-height:1.45}.share{display:grid;grid-template-columns:86px 1fr;gap:16px;align-items:center;width:100%;margin-top:12px;padding:14px;border-radius:20px;color:#0a2118;background:var(--green-soft);text-align:left}.share img{display:block;width:86px;height:86px;padding:5px;background:#fff}.share strong{font-size:15px}.share p{margin:6px 0;font-size:12px;line-height:1.4}.share small{opacity:.62;font-size:10px}.restart{width:100%;margin-top:14px;border-color:var(--green);color:#082019;background:var(--green);font-weight:750}
    @keyframes flash{0%,100%{opacity:0}18%,80%{opacity:1}}
    @media(max-width:350px){.app{padding-left:15px;padding-right:15px}.hero{padding-top:43px;padding-bottom:30px}.card{grid-template-rows:auto 92px;border-radius:20px}.info{padding:13px 11px}.vs{width:66px;height:66px;font-size:19px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  </style>
</head>
<body>
  <main class="app" id="app"></main>
  <script>
    const SONGS=[
      {id:"yinghuo",name:"萤火",note:"萤火 · 2025",cover:"firefly"},
      {id:"klein",name:"克莱因蓝的独白",note:"乘风2026 · 乘风之夜现场",cover:"klein"},
      {id:"summer",name:"盛夏晚风",note:"夏日限定 · 现场",cover:"summer"},
      {id:"moon",name:"月光来信",note:"月光来信 · 2024",cover:"moon"}
    ];
    const KEY="songpk:v1:github";const FP=SONGS.map(s=>s.id).join("|");let locked=false;
    const shuffle=a=>{a=[...a];for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
    const fresh=()=>({fingerprint:FP,players:shuffle(SONGS),winners:[],match:0,history:[],regrets:3,champion:null,runnerUp:null,semifinalists:[]});
    let state=load();if(!state.semifinalists.length)state.semifinalists=[...state.players];
    function load(){try{const x=JSON.parse(localStorage.getItem(KEY));if(x&&x.fingerprint===FP)return x}catch(e){}return fresh()}
    function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
    function butterfly(){return '<span class="butterfly"><i></i><i></i><i></i><i></i></span>'}
    function art(song){return `<span class="art ${song.cover}"><i class="grain"></i>${song.cover==="firefly"?'<i class="dots"></i>':""}</span>`}
    function card(song,side){return `<button class="card" data-id="${song.id}" data-side="${side}" aria-label="选择歌曲《${song.name}》">${art(song)}<span class="info"><strong>${song.name}</strong><small>${song.note}</small></span><i class="check">✓</i></button>`}
    function render(){
      const root=document.querySelector("#app");
      if(state.champion){root.innerHTML=champion();bindChampion();return}
      const pair=state.players.slice(state.match*2,state.match*2+2),final=state.players.length===2,round=final?"决赛":"4 强",total=state.players.length/2,progress=Math.max(7,state.history.length/3*100);
      root.innerHTML=`<header class="topbar"><div class="brand">${butterfly()}<div><strong>小蝴蝶歌单</strong><span>${round} · 第 ${state.match+1} 场</span></div></div><button class="reset" aria-label="重新开始">↻</button></header><div class="progress"><i style="width:${progress}%"></i></div><section class="hero"><span class="pill">${round} · ${final?"FINAL":"ROUND OF 4"}</span><h1>${final?"冠军之战":"心动对决"}</h1><p>${state.match+1} / ${total}</p></section><section class="battle">${card(pair[0],"left")}<div class="vs">VS</div>${card(pair[1],"right")}</section><footer class="actions"><p>点击卡片选出胜者</p><button class="undo" ${!state.history.length||!state.regrets?"disabled":""}>↩ 反悔 · ${state.regrets}</button></footer>`;
      document.querySelectorAll(".card").forEach(el=>el.addEventListener("click",()=>choose(el.dataset.id)));
      document.querySelector(".reset").onclick=restart;document.querySelector(".undo").onclick=undo;
    }
    function choose(id){
      if(locked)return;locked=true;const pair=state.players.slice(state.match*2,state.match*2+2),winner=pair.find(s=>s.id===id),loser=pair.find(s=>s.id!==id);
      document.querySelectorAll(".card").forEach(el=>{el.disabled=true;if(el.dataset.id===id)el.classList.add("selected");else el.classList.add("loser-"+el.dataset.side)});
      setTimeout(()=>{state.history.push(JSON.parse(JSON.stringify({players:state.players,winners:state.winners,match:state.match,champion:state.champion,runnerUp:state.runnerUp})));const wins=[...state.winners,winner],last=state.match+1>=state.players.length/2;
        if(!last){state.winners=wins;state.match++}
        else if(state.players.length===2){state.champion=winner;state.runnerUp=loser}
        else{state.players=wins;state.winners=[];state.match=0;flash()}
        save();locked=false;render()
      },480)
    }
    function undo(){if(locked||!state.history.length||!state.regrets)return;const h=state.history.pop();state.players=h.players;state.winners=h.winners;state.match=h.match;state.champion=h.champion;state.runnerUp=h.runnerUp;state.regrets--;save();render()}
    function restart(){try{localStorage.removeItem(KEY)}catch(e){}state=fresh();state.semifinalists=[...state.players];render()}
    function flash(){const d=document.createElement("div");d.className="transition";d.innerHTML=butterfly()+"<strong>进入决赛</strong>";document.body.appendChild(d);setTimeout(()=>d.remove(),850)}
    function champion(){const c=state.champion;return `<section class="champion"><span class="pill">MY SONG CHAMPION</span><div class="crown">♛</div><p>我的心动冠军</p><h1>${c.name}</h1><div class="champ-cover">${art(c)}</div><section class="summary"><div><span>亚军</span><strong>${state.runnerUp.name}</strong></div><div><span>四强</span><strong>${state.semifinalists.map(s=>s.name).join(" · ")}</strong></div></section><section class="share"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJQAAACUCAYAAAB1PADUAAAAAklEQVR4AewaftIAAATvSURBVO3BQY4jRxAEwfAC//9l1x7zVECjk7MaKczwj1QtOaladFK16KRq0UnVopOqRSdVi06qFp1ULTqpWnRSteikatFJ1aKTqkUnVYtOqhZ98hKQn6RmAjKpmYBMam6ATGpugExqboDcqJmA/CQ1b5xULTqpWnRSteiTZWo2AXlDzQTkm4DcqHlDzSYgm06qFp1ULTqpWvTJlwF5Qs0TaiYgk5pNQCY1TwCZ1LwB5Ak133RSteikatFJ1aJPfjkgk5obNTdAJiCTmhsgk5r/k5OqRSdVi06qFn3yy6mZgExqboBMaiYgE5AbNf9nJ1WLTqoWnVQt+uTL1PwkNTdA3lCzCcik5gk1/yYnVYtOqhadVC36ZBmQnwRkUjMBmdRMQN4AMqmZgExqJiBPAPk3O6ladFK16KRqEf6RXwzIE2reADKpmYBMaiYgk5r/kpOqRSdVi06qFn3yEpBJzQTkRs0E5Ak1N0AmIJOaJ9Q8AeQNIJOaGyCTmgnIjZo3TqoWnVQtOqlahH/kLwJyo2YCMqmZgNyouQEyqbkBMqm5AfJNap4AMql546Rq0UnVopOqRZ+8BGRSMwF5Qs0E5Ak1N0Bu1LwB5EbNBGRSMwG5UXMD5EbNppOqRSdVi06qFn3yZWomIJOaCcikZgIyAblRc6NmAnKjZlJzA+QJIE8AmdRMam6ATGreOKladFK16KRq0ScvqbkB8gaQGzU3QCY1E5BNQCY1E5BJzSYgN2omNZtOqhadVC06qVr0yTIgTwC5UTMBuQEyqXlCzQ2QSc0bQCY1E5BJzY2aCcgE5EbNGydVi06qFp1ULfrky9RMQJ4A8gaQSc2kZgIyqZnUfBOQGyA3av6mk6pFJ1WLTqoWffKXqZmATGpugLwBZFJzA2RSM6mZgNyoeQPIjZoJyKRm00nVopOqRSdViz55Ccik5gkgk5oJyBNqboBMaiYgk5obIJOaSc1PAjKp+UknVYtOqhadVC3CP/IvAmRSMwGZ1ExAJjU3QCY1N0AmNROQSc0NkEnNDZBJzQTkCTWbTqoWnVQtOqla9MlLQCY1E5A3gDyhZgJyo2YCMqm5AfJNQG6ATGomIJOabzqpWnRSteikatEnL6l5Q80EZFIzAbkBMql5Qs2NmgnIG2omIJOa3+SkatFJ1aKTqkX4RxYBmdRMQN5QMwGZ1ExAbtQ8AeQ3U/NNJ1WLTqoWnVQtwj/yiwF5Q80EZFJzA+QJNROQSc0TQDapeeOkatFJ1aKTqkWfvATkJ6l5Qs0EZALyTWomIE8AmdQ8oWYCMqnZdFK16KRq0UnVok+WqdkE5A0gk5oJyA2QSc2NmgnIpGYCcqNmk5pvOqladFK16KRq0SdfBuQJNU+ouQFyo+YJIJOaCcik5gkgb6iZgDyh5o2TqkUnVYtOqhZ98ssBmdTcAJnUTECeADKpuQHyhJoJyA2QSc0NkE0nVYtOqhadVC365D9OzQRkAjKpmYBMam6A3KjZpOYGyKTmm06qFp1ULTqpWvTJl6n5JjVvqJmATGpugExqngAyqZmATGomIDdqJiCTmk0nVYtOqhadVC36ZBmQnwRkUnOj5kbNBORGzRNAnlDzhJq/6aRq0UnVopOqRfhHqpacVC06qVp0UrXopGrRSdWik6pFJ1WLTqoWnVQtOqladFK16KRq0UnVopOqRSdVi/4BFvROQgE613oAAAAASUVORK5CYII=" alt="扫码重新开始歌曲 PK"><div><strong>这首歌赢到最后</strong><p>“我的冠军是《${c.name}》，你也来选选？”</p><small>扫码开启你的随机对阵</small></div></section><button class="restart">再玩一次</button></section>`}
    function bindChampion(){document.querySelector(".restart").onclick=restart}
    render();
  </script>
</body>
</html>
